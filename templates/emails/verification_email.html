<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
    
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:20px;">
        <tr>
            <td align="center">
                
                <table width="600" cellpadding="0" cellspacing="0" 
                       style="background:#ffffff; border-radius:10px; overflow:hidden;">
                    
                    <!-- Header -->
                    <tr>
                        <td style="background:#4CAF50; color:white; text-align:center; padding:20px;">
                            <h1 style="margin:0;">Verify Your Account</h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:30px; text-align:center;">
                            <h2 style="color:#333;">Hello {{ user_name }},</h2>
                            
                            <p style="color:#666; font-size:16px; line-height:1.5;">
                             Hello {{ name}}!   Thank you for signing up. Use the OTP code below to activate your account:
                            </p>

                            <!-- OTP Box -->
                            <div style="
                                display:inline-block;
                                background:#f8f8f8;
                                border:2px dashed #4CAF50;
                                padding:20px 40px;
                                margin:20px 0;
                                font-size:32px;
                                font-weight:bold;
                                letter-spacing:8px;
                                color:#4CAF50;
                            ">
                                {{ verify_code }}
                            </div>

                            <p style="color:#666; font-size:14px;">
                                This code will expire in <strong>10 minutes</strong>.
                            </p>

                            <p style="color:#666; font-size:14px;">
                                If you didn’t create this account, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f4f4f4; text-align:center; padding:15px; font-size:12px; color:#777;">
                            © 2026 KCC. All rights reserved.
                        </td>
                    </tr>

                </table>
                
            </td>
        </tr>
    </table>

</body>
</html>
